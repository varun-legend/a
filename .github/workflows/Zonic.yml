name: 🚀 Cross-Repo Android Release Pipeline (Zonic)

on:
  repository_dispatch:
    types: [zonic]

  workflow_dispatch:
    inputs:
      bump:
        description: "Which part to bump (patch | minor | major)"
        required: false
        default: "patch"

      build_type:
        description: "Build variant (debug | release)"
        required: false
        default: "release"

concurrency:
  group: zonic-release-${{ github.repository }}-${{ github.ref_name }}-${{ github.event.inputs.build_type || 'release' }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  SOURCE_REPO: "varun-legend/Zonic"

jobs:
  build-and-publish:
    name: Build • Release
    runs-on: ubuntu-latest

    env:
      RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
      RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
      RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
      PAT: ${{ secrets.PAT }}
      GRADLE_ENCRYPTION_KEY: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      BUILD_TYPE: ${{ github.event.inputs.build_type || 'release' }}

    steps:
      - name: 📁 Checkout workflow repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 1
          path: ci

      - name: 📁 Checkout source repo (Zonic)
        uses: actions/checkout@v6
        with:
          repository: ${{ env.SOURCE_REPO }}
          token: ${{ secrets.PAT }}
          fetch-depth: 1

      - name: 🧰 Prepare Gradle wrapper
        run: |
          set -euo pipefail

          if [ -f "./gradlew" ]; then
            chmod +x ./gradlew
          elif [ -f "ci/gradlew" ]; then
            cp ci/gradlew ./gradlew
            chmod +x ./gradlew
          else
            echo "ERROR: gradlew not found in root or ci/"
            exit 1
          fi

      - name: 🔧 Setup Temurin JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: ⚡ Setup Gradle cache
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-encryption-key: ${{ env.GRADLE_ENCRYPTION_KEY }}
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/release' }}

      - name: 🔐 Decode release keystore
        if: ${{ env.BUILD_TYPE == 'release' }}
        run: |
          set -euo pipefail

          if [ -z "${{ secrets.RELEASE_STORE_FILE }}" ]; then
            echo "ERROR: RELEASE_STORE_FILE secret not set"
            exit 1
          fi

          KEYSTORE_PATH="$GITHUB_WORKSPACE/keystore.p12"
          printf '%s' "${{ secrets.RELEASE_STORE_FILE }}" | base64 --decode > "$KEYSTORE_PATH"
          chmod 600 "$KEYSTORE_PATH"

          echo "KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"

      - name: 🔍 Bump asset version for UI
        id: version
        env:
          BUMP: ${{ github.event.inputs.bump }}
        run: |
          set -euo pipefail

          BUMP="${BUMP:-patch}"
          VERSION_FILE="app/src/main/assets/version.txt"

          mkdir -p "$(dirname "$VERSION_FILE")"

          if [ ! -f "$VERSION_FILE" ]; then
            printf 'versionName=0.0.0\nversionCode=0\n' > "$VERSION_FILE"
          fi

          CURRENT_NAME=$(awk -F= '/^versionName/ {print $2; exit}' "$VERSION_FILE" | tr -d '\r' || true)
          CURRENT_CODE=$(awk -F= '/^versionCode/ {print $2; exit}' "$VERSION_FILE" | tr -d '\r' || true)

          CURRENT_NAME=${CURRENT_NAME:-0.0.0}
          CURRENT_CODE=${CURRENT_CODE:-0}

          IFS='.' read -r MA MI PA <<< "$CURRENT_NAME"

          MA=${MA:-0}
          MI=${MI:-0}
          PA=${PA:-0}

          MA=$(printf '%s' "$MA" | grep -oE '^[0-9]+' || echo 0)
          MI=$(printf '%s' "$MI" | grep -oE '^[0-9]+' || echo 0)
          PA=$(printf '%s' "$PA" | grep -oE '^[0-9]+' || echo 0)

          case "$BUMP" in
            major)
              MA=$((MA + 1))
              MI=0
              PA=0
              ;;
            minor)
              MI=$((MI + 1))
              PA=0
              ;;
            *)
              PA=$((PA + 1))
              ;;
          esac

          NEW_VERSION="${MA}.${MI}.${PA}"
          NEW_CODE=$((CURRENT_CODE + 1))

          printf 'versionName=%s\nversionCode=%s\n' "$NEW_VERSION" "$NEW_CODE" > "$VERSION_FILE"

          echo "version_name=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "version_code=$NEW_CODE" >> "$GITHUB_OUTPUT"

      - name: 🧱 Build
        id: build
        run: |
          set -euo pipefail

          if [ "$BUILD_TYPE" = "debug" ]; then
            ./gradlew assembleDebug --configuration-cache --build-cache
          else
            ./gradlew assembleRelease \
              --configuration-cache \
              --build-cache \
              --parallel \
              -PRELEASE_STORE_FILE="$KEYSTORE_PATH" \
              -PRELEASE_KEY_ALIAS="$RELEASE_KEY_ALIAS" \
              -PRELEASE_STORE_PASSWORD="$RELEASE_STORE_PASSWORD" \
              -PRELEASE_KEY_PASSWORD="$RELEASE_KEY_PASSWORD"
          fi

          echo "built=$BUILD_TYPE" >> "$GITHUB_OUTPUT"

      - name: 🔎 Find APK
        id: find-apk
        run: |
          set -euo pipefail

          if [ "$BUILD_TYPE" = "debug" ]; then
            APK=$(find app/build/outputs -type f -name "*debug*.apk" | head -n 1 || true)
          else
            APK=$(find app/build/outputs -type f -name "*release*.apk" | head -n 1 || true)
          fi

          if [ -z "$APK" ]; then
            APK=$(find app/build/outputs -type f -name "*.apk" | head -n 1 || true)
          fi

          if [ -z "$APK" ]; then
            echo "No APK found."
            exit 1
          fi

          if [ "$BUILD_TYPE" = "debug" ]; then
            TARGET_NAME="Zonic-v${{ steps.version.outputs.version_name }}-debug.apk"
          else
            TARGET_NAME="Zonic-v${{ steps.version.outputs.version_name }}.apk"
          fi

          TARGET_PATH="$(dirname "$APK")/$TARGET_NAME"
          mv "$APK" "$TARGET_PATH"

          echo "apk_name=$TARGET_NAME" >> "$GITHUB_OUTPUT"
          echo "apk_path=$TARGET_PATH" >> "$GITHUB_OUTPUT"

      - name: 📝 Commit asset version back to source
        if: ${{ steps.find-apk.outputs.apk_path != '' }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git diff --quiet -- app/src/main/assets/version.txt; then
            exit 0
          fi

          git add app/src/main/assets/version.txt
          git commit -m "ci: bump UI version to v${{ steps.version.outputs.version_name }} [skip zonic]"

          SOURCE_BRANCH="$(git branch --show-current)"
          SOURCE_BRANCH="${SOURCE_BRANCH:-main}"

          git push \
            "https://x-access-token:${{ secrets.PAT }}@github.com/${{ env.SOURCE_REPO }}.git" \
            HEAD:"$SOURCE_BRANCH"

      - name: 🧾 Create or update GitHub Release
        if: ${{ steps.find-apk.outputs.apk_path != '' }}
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          set -euo pipefail

          if [ "$BUILD_TYPE" = "debug" ]; then
            TAG="v${{ steps.version.outputs.version_name }}-debug"
            TITLE="🧪 Debug Release ${TAG}"
            BODY="Debug release ${TAG} (code ${{ steps.version.outputs.version_code }})"
          else
            TAG="v${{ steps.version.outputs.version_name }}"
            TITLE="📦 Release ${TAG}"
            BODY="Release ${TAG} (code ${{ steps.version.outputs.version_code }})"
          fi

          APK_PATH="${{ steps.find-apk.outputs.apk_path }}"

          if gh release view "$TAG" --repo "${{ env.SOURCE_REPO }}" >/dev/null 2>&1; then
            gh release upload "$TAG" "$APK_PATH" \
              --repo "${{ env.SOURCE_REPO }}" \
              --clobber
          else
            gh release create "$TAG" "$APK_PATH" \
              --repo "${{ env.SOURCE_REPO }}" \
              -t "$TITLE" \
              -n "$BODY"
          fi
