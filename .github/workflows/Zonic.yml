name: 🚀 Cross-Repo Android Release Pipeline (Zonic)

on:
  repository_dispatch:
    types: [zonic]
  workflow_dispatch:
    inputs:
      bump:
        description: "Which part to bump (patch | minor | major)"
        required: false
        default: "patch"
      build_type:
        description: "Build variant (debug | release)"
        required: false
        default: "release"

concurrency:
  group: zonic-release-${{ github.repository }}-${{ github.ref_name }}-${{ github.event.inputs.build_type || 'release' }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  SOURCE_REPO: "varun-legend/Zonic"

jobs:
  build-and-publish:
    name: Build • Release
    runs-on: ubuntu-latest

    env:
      RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
      RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
      RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
      PAT: ${{ secrets.PAT }}
      GRADLE_ENCRYPTION_KEY: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
      BUILD_TYPE: ${{ github.event.inputs.build_type || 'release' }}

    steps:
      - name: 📁 Checkout source repo (Zonic)
        uses: actions/checkout@v5
        with:
          repository: ${{ env.SOURCE_REPO }}
          token: ${{ secrets.PAT }}
          fetch-depth: 1
          path: source

      - name: 🔧 Setup Temurin JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: ⚡ Setup Gradle cache
        uses: gradle/actions/setup-gradle@v5
        with:
          cache-encryption-key: ${{ env.GRADLE_ENCRYPTION_KEY }}
          cache-read-only: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/release' }}

      - name: 📥 Ensure gradlew executable
        run: chmod +x ./source/gradlew

      - name: 🔐 Restore keystore + signing props
        if: ${{ env.BUILD_TYPE == 'release' }}
        run: |
          set -euo pipefail

          if [ -z "${{ secrets.RELEASE_STORE_FILE }}" ]; then
            echo "ERROR: RELEASE_STORE_FILE secret not set"
            exit 1
          fi

          cd source

          KEY_BASENAME="varun-release-key-$(echo "${SOURCE_REPO}" | tr '/' '-')"
          printf '%s' "${{ secrets.RELEASE_STORE_FILE }}" | base64 --decode > "${KEY_BASENAME}.p12"
          chmod 600 "${KEY_BASENAME}.p12"

          if [ -f gradle.properties ]; then
            grep -vE '^(RELEASE_STORE_FILE|RELEASE_KEY_ALIAS|RELEASE_STORE_PASSWORD|RELEASE_KEY_PASSWORD)=' gradle.properties > gradle.properties.tmp || true
            mv gradle.properties.tmp gradle.properties || true
          fi

          printf 'RELEASE_STORE_FILE=%s.p12\n' "${KEY_BASENAME}" >> gradle.properties
          printf 'RELEASE_KEY_ALIAS=%s\n' "${{ secrets.RELEASE_KEY_ALIAS }}" >> gradle.properties
          printf 'RELEASE_STORE_PASSWORD=%s\n' "${{ secrets.RELEASE_STORE_PASSWORD }}" >> gradle.properties
          printf 'RELEASE_KEY_PASSWORD=%s\n' "${{ secrets.RELEASE_KEY_PASSWORD }}" >> gradle.properties

      - name: 🔍 Bump version and write version.properties
        id: version
        env:
          BUMP: ${{ github.event.inputs.bump }}
        run: |
          set -euo pipefail

          cd source
          BUMP="${BUMP:-patch}"

          if [ ! -f version.properties ]; then
            printf 'versionName=0.0.0\nversionCode=0\n' > version.properties
          fi

          CURRENT_NAME=$(awk -F= '/^versionName/ {print $2; exit}' version.properties | tr -d '\r' || true)
          CURRENT_CODE=$(awk -F= '/^versionCode/ {print $2; exit}' version.properties | tr -d '\r' || true)

          CURRENT_NAME=${CURRENT_NAME:-0.0.0}
          CURRENT_CODE=${CURRENT_CODE:-0}

          IFS='.' read -r MA MI PA <<< "$CURRENT_NAME"
          MA=${MA:-0}
          MI=${MI:-0}
          PA=${PA:-0}

          MA=$(printf '%s' "$MA
