name: 🚀 Cross-Repo Android Release Pipeline (Echo)

concurrency:
  group: echo-release-${{ github.repository }}-${{ github.ref_name }}
  cancel-in-progress: true

on:
  repository_dispatch:
    types: [echo]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Which part to bump (patch | minor | major)'
        required: false
        default: 'patch'

env:
  SOURCE_REPO: "varun-legend/echo"

jobs:
  build-and-publish:
    name: Build • Assemble • Distribute
    runs-on: ubuntu-latest
    env:
      RELEASE_KEY_ALIAS:      ${{ secrets.RELEASE_KEY_ALIAS }}
      RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
      RELEASE_KEY_PASSWORD:   ${{ secrets.RELEASE_KEY_PASSWORD }}
      PAT:                    ${{ secrets.PAT }}
    steps:
      - name: 🧾 Checkout this repo (broker) metadata
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 📁 Checkout source repo (echo)
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          token: ${{ secrets.PAT }}
          fetch-depth: 0
          path: source

      - name: ⚡ Cache Gradle (source)
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            source/.gradle
            source/.gradle/caches
            source/.gradle/wrapper
          key: gradle-cache-${{ runner.os }}-${{ env.SOURCE_REPO }}-${{ hashFiles('source/**/build.gradle*', 'source/**/settings.gradle*', 'source/gradle.properties') }}
          restore-keys: |
            gradle-cache-${{ runner.os }}-${{ env.SOURCE_REPO }}-

      - name: 🔧 Setup Temurin JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: 📥 Ensure gradlew executable
        run: chmod +x ./source/gradlew

      - name: 🔐 Restore keystore + append signing props (into source)
        run: |
          set -euo pipefail
          if [ -z "${{ secrets.RELEASE_STORE_FILE }}" ]; then
            exit 1
          fi
          SOURCE_REPO="${SOURCE_REPO:-${{ env.SOURCE_REPO }}}"
          KEY_BASENAME="varun-release-key-$(echo "$SOURCE_REPO" | tr '/' '-')"
          printf '%s' "${{ secrets.RELEASE_STORE_FILE }}" | base64 --decode > "$GITHUB_WORKSPACE/source/${KEY_BASENAME}.p12"
          chmod 600 "$GITHUB_WORKSPACE/source/${KEY_BASENAME}.p12"
          if [ -f source/gradle.properties ]; then
            grep -vE '^(RELEASE_STORE_FILE|RELEASE_KEY_ALIAS|RELEASE_STORE_PASSWORD|RELEASE_KEY_PASSWORD)=' source/gradle.properties > source/gradle.properties.tmp || true
            mv source/gradle.properties.tmp source/gradle.properties || true
          fi
          printf 'RELEASE_STORE_FILE=%s.p12\n' "${KEY_BASENAME}" >> source/gradle.properties
          printf 'RELEASE_KEY_ALIAS=%s\n' "${{ secrets.RELEASE_KEY_ALIAS }}" >> source/gradle.properties
          printf 'RELEASE_STORE_PASSWORD=%s\n' "${{ secrets.RELEASE_STORE_PASSWORD }}" >> source/gradle.properties
          printf 'RELEASE_KEY_PASSWORD=%s\n' "${{ secrets.RELEASE_KEY_PASSWORD }}" >> source/gradle.properties

      - name: 🔍 Bump version (in-place, no reclone) — compute & write version.properties
        id: get-version
        env:
          BUMP: ${{ github.event.inputs.bump }}
        run: |
          set -euo pipefail
          BUMP="${BUMP:-patch}"
          cd source
          if [ ! -f version.properties ]; then
            printf 'versionName=0.0.0\nversionCode=0\n' > version.properties
          fi
          CURRENT_NAME=$(awk -F= '/^versionName/ {print $2; exit}' version.properties | tr -d '\r' || true)
          CURRENT_CODE=$(awk -F= '/^versionCode/ {print $2; exit}' version.properties | tr -d '\r' || true)
          CURRENT_NAME=${CURRENT_NAME:-0.0.0}
          CURRENT_CODE=${CURRENT_CODE:-0}
          MA=$(printf '%s' "$CURRENT_NAME" | awk -F. '{print $1}' | grep -oE '^[0-9]+' || echo 0)
          MI=$(printf '%s' "$CURRENT_NAME" | awk -F. '{print $2}' | grep -oE '^[0-9]+' || echo 0)
          PA=$(printf '%s' "$CURRENT_NAME" | awk -F. '{print $3}' | grep -oE '^[0-9]+' || echo 0)
          MA=${MA:-0}; MI=${MI:-0}; PA=${PA:-0}
          case "$BUMP" in
            major) MA=$((MA + 1)); MI=0; PA=0 ;;
            minor) MI=$((MI + 1)); PA=0 ;;
            *)     PA=$((PA + 1)) ;;
          esac
          NEW_VERSION="${MA}.${MI}.${PA}"
          NEW_CODE=$((CURRENT_CODE + 1))
          printf 'versionName=%s\nversionCode=%s\n' "$NEW_VERSION" "$NEW_CODE" > version.properties
          echo "version_name=${NEW_VERSION}" >> "$GITHUB_OUTPUT"
          echo "version_code=${NEW_CODE}" >> "$GITHUB_OUTPUT"

      - name: 🧹 Clean & Build Release
        id: build
        run: |
          set -euo pipefail
          cd source
          ./gradlew clean assembleRelease --no-daemon --parallel --configure-on-demand -Dorg.gradle.caching=true -Dorg.gradle.parallel=true -Dorg.gradle.workers.max=4
          echo "built=release" >> "$GITHUB_OUTPUT"

      - name: 🔎 Find release artifact and rename
        id: find-apk
        run: |
          set -euo pipefail
          ARTIFACT=$(find source/app/build/outputs -type f \( -name "*release*.apk" -o -name "*.aab" -o -name "*.apk" \) | head -n 1 || true)
          if [ -z "$ARTIFACT" ]; then
            echo "ERROR: No APK/AAB artifact found under source/app/build/outputs after a successful release build."
            echo "Debug listing:"
            find source/app/build/outputs -maxdepth 5 -type f | sed 's/^/ - /' || true
            exit 1
          fi
          NAME=$(basename "$ARTIFACT")
          TARGET_NAME="Echo-v${{ steps.get-version.outputs.version_name }}-${NAME}"
          TARGET_DIR="$(dirname "$ARTIFACT")"
          TARGET_PATH="$TARGET_DIR/$TARGET_NAME"
          mv "$ARTIFACT" "$TARGET_PATH"
          echo "apk_name=$TARGET_NAME" >> "$GITHUB_OUTPUT"
          echo "apk_path=$TARGET_PATH" >> "$GITHUB_OUTPUT"

      - name: 🔍 Print entire build tree
      run: |
       echo "------ FULL SOURCE TREE ------"
       find source -type f | sort
       
       - name: ⚙️ Ensure gh CLI
        run: |
          set -euo pipefail
          if ! command -v gh >/dev/null 2>&1; then
            sudo apt update -y
            sudo apt install -y gh
          fi

      - name: 🔐 Validate release token access (fail-fast)
        if: ${{ github.event_name != 'pull_request' }}
        env:
          GH_TOKEN: ${{ secrets.PAT }}
          SOURCE_REPO: ${{ env.SOURCE_REPO }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "ERROR: PAT secret is missing or empty; cannot authenticate gh CLI for release upload."
            exit 1
          fi
          if ! gh auth status >/tmp/gh-auth-status.log 2>&1; then
            echo "ERROR: gh authentication failed with PAT. Details:"
            cat /tmp/gh-auth-status.log
            exit 1
          fi
          if ! gh api "repos/${SOURCE_REPO}" >/tmp/gh-api-access.log 2>&1; then
            echo "ERROR: PAT cannot access repo '${SOURCE_REPO}'. Ensure PAT has repo/contents:write scope and repo access."
            cat /tmp/gh-api-access.log
            exit 1
          fi

      - name: 📝 Prepare version outputs (NO PUSH — intentionally)
        id: commit-bump
        if: always()
        run: |
          set -euo pipefail
          cd source || exit 0
          if [ -f version.properties ]; then
            VNAME=$(awk -F= '/^versionName/ {print $2; exit}' version.properties | tr -d '\r' || true)
            VCODE=$(awk -F= '/^versionCode/ {print $2; exit}' version.properties | tr -d '\r' || true)
          else
            VNAME="${{ steps.get-version.outputs.version_name }}"
            VCODE="${{ steps.get-version.outputs.version_code }}"
          fi
          VNAME=${VNAME:-${{ steps.get-version.outputs.version_name }}}
          VCODE=${VCODE:-${{ steps.get-version.outputs.version_code }}}
          echo "version_name=${VNAME}" >> "$GITHUB_OUTPUT"
          echo "version_code=${VCODE}" >> "$GITHUB_OUTPUT"

      - name: 🧾 Create or upload GitHub Release in source repo & upload APK (ALWAYS upload if artifact exists)
        id: create_release
        if: ${{ github.event_name != 'pull_request' }}
        env:
          GH_TOKEN: ${{ secrets.PAT }}
          SOURCE_REPO: ${{ env.SOURCE_REPO }}
        run: |
          set -euo pipefail
          TAG="v${{ steps.commit-bump.outputs.version_name }}"
          TITLE="📦 Release ${TAG}"
          BODY="Release ${TAG} (code ${{ steps.commit-bump.outputs.version_code }})"
          APK_PATH="${{ steps.find-apk.outputs.apk_path }}"
          if [ -z "$APK_PATH" ] || [ ! -f "$APK_PATH" ]; then
            echo "ERROR: Release artifact path is missing or invalid: '$APK_PATH'."
            exit 1
          fi
          if gh release view "$TAG" --repo "${SOURCE_REPO}" >/dev/null 2>&1; then
            if ! gh release upload "$TAG" "$APK_PATH" --repo "${SOURCE_REPO}" --clobber; then
              echo "ERROR: Failed to upload artifact to existing release tag '${TAG}' in '${SOURCE_REPO}'."
              exit 1
            fi
          else
            if ! gh release create "$TAG" "$APK_PATH" --repo "${SOURCE_REPO}" -t "${TITLE}" -n "${BODY}"; then
              echo "ERROR: Failed to create release tag '${TAG}' and upload artifact in '${SOURCE_REPO}'."
              exit 1
            fi
          fi
